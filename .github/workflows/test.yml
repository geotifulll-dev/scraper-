name: Test Scraper

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # ხელით გაშვება

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run scraper test
        run: |
          python -c "import requests; from bs4 import BeautifulSoup; print('✅ Imports work!')"
          python main.py || echo "⚠️ Scraper has issues"
          
      - name: Check results
        run: |
          if [ -f results.csv ]; then
            echo "✅ results.csv created!"
            head -5 results.csv
          else
            echo "❌ No results.csv found"
          fi
