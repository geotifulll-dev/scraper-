name: Ultimate Mobile App Scraper

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-api-scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Python Environment Load
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Requirements Bypass Tool
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi requests
          
      - name: Mobile API Engine Start!
        run: python main.py
          
      - name: Save Mobile App Extractions!
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MOBILE-DATABASE
          path: |
            *.csv
            *.json
            *.txt
            *.html
