name: 2-Level Deep Auto Scraper

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deep-scan-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Code Load
        uses: actions/checkout@v4
        
      - name: Environment Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Libraries Build
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 curl_cffi requests
          
      - name: Launch Deep Details Extractor!
        run: python main.py
          
      - name: File Archiver
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Deep-Scan-Database
          path: |
            *.csv
            *.json
