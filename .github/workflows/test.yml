name: Auto Scraper Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # ეს ააჩქარებს ინსტალაციას
          
      - name: Install required Python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Run Scraper Script
        run: python main.py
          
      - name: Upload Scraper Artifacts (Results)
        if: always() # ეს ხაზი უზრუნველყოფს, რომ error-იც რომ ამოაგდოს ერორ-ლოგებს ატვირთავს მაინც
        uses: actions/upload-artifact@v4
        with:
          name: Autowini-Data
          path: |
            results.csv
            debug_data.json
            debug_html.txt
