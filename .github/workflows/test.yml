name: Multipage Auto Scraper Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # უსწრაფესი ინსტალაციისთვის
          
      - name: Install Python libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Start Scraping Main
        run: python main.py
          
      - name: Save CSV Data Output
        if: always() # ეს ნიშნავს რომ თუ დაქრაშა, csv მაინც ატვირთოს რაც კი გადმოწერა უკვე!
        uses: actions/upload-artifact@v4
        with:
          name: Autowini-Export-CSV
          path: results.csv
