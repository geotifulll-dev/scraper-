name: Multipage Auto Scraper Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Bypass and Scraping libraries
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 curl_cffi
          
      - name: Start Scraping Main
        run: python main.py
          
      - name: Save Data & Debug info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Autowini-Data
          path: |
            results.csv
            debug_html.txt
