name: Autowini Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Check output file
        run: |
          ls -la
          test -f autowini_cars.csv

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: autowini-cars
          path: autowini_cars.csv
